name: Continuous Integration

on:
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    name: Code Quality & Build Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "./server/package-lock.json" # Tells the cache where the lockfile is

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/mock-db"

      - name: Run Linter
        run: npm run lint
        continue-on-error: false

      - name: Verify TypeScript Compilation
        run: npm run build
